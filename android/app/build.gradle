plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) { flutterVersionCode = "1" }

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) { flutterVersionName = "1.0" }

android {
    namespace = "com.nutriscan.ai_nutriscan"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = "11"
    }

    defaultConfig {
        applicationId = "com.nutriscan.ai_nutriscan"
        minSdkVersion = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
    }

    buildTypes {
        release {
            // Production signing requires:
            // 1. Create a keystore: keytool -genkey -v -keystore android/key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias nutriscan
            // 2. Create android/key.properties with storePassword, keyPassword, keyAlias, storeFile=key.jks
            // 3. Uncomment signingConfig below and comment out debug
            // 4. Build with: flutter build apk --release
            signingConfig = signingConfigs.debug // TODO: Change to signingConfigs.release after creating keystore
        }
    }
}

flutter {
    source = "../.."
}
